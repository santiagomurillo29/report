server:
  port: 8087
spring:
  application:
    name: "ReportModel"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    active: local
entrypoint:
  sqs:
    region: "us-east-1"
    endpoint: "https://sqs.us-east-1.amazonaws.com/418272784514/report-queue"
    #queueUrl: "http://localhost:4566/000000000000/sample"
    waitTimeSeconds: 20
    maxNumberOfMessages: 10
    visibilityTimeoutSeconds: 10
    numberOfThreads: 1
aws:
  region: ${AWS_REGION:us-east-1}
#  dynamodb:
#    endpoint: ${DYNAMO_ENDPOINT:http://dynamodb:8000}
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
jwt:
  secret: "mysuperlongsecretkeythatismorethan32bytes123!"
